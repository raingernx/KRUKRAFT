name: Browser Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CI: "1"
  NODE_ENV: development
  PORT: 3000
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/krukraft_ci?schema=public
  DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/krukraft_ci?schema=public
  NEXTAUTH_URL: http://127.0.0.1:3000
  NEXTAUTH_SECRET: ci-nextauth-secret
  STRIPE_SECRET_KEY: sk_test_ci_dummy
  STRIPE_WEBHOOK_SECRET: whsec_ci_dummy
  STRIPE_PRO_MONTHLY_PRICE_ID: price_ci_monthly
  STRIPE_PRO_ANNUAL_PRICE_ID: price_ci_annual
  STRIPE_TEAM_MONTHLY_PRICE_ID: price_ci_team_monthly
  STRIPE_TEAM_ANNUAL_PRICE_ID: price_ci_team_annual
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
  PLAYWRIGHT_DISABLE_WEBKIT_FALLBACK: "1"
  BROWSER_PROBE_ARTIFACT_DIR: artifacts/browser-probes

concurrency:
  group: browser-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  browser_smoke:
    name: Browser Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: krukraft_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d krukraft_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Browser CI
        uses: ./.github/actions/setup-browser-ci
        with:
          node-version: "24"
          playwright-browsers-path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run Browser Smoke
        run: npm run smoke:browser:ci

      - name: Run Dashboard Browser Probes
        run: |
          mkdir -p "${BROWSER_PROBE_ARTIFACT_DIR}"
          bash scripts/run-browser-probe-ci.sh \
            "${BROWSER_PROBE_ARTIFACT_DIR}/dashboard.log" \
            npm run browser:probe:dashboard

      - name: Run Public/Admin Page Browser Probes
        run: |
          mkdir -p "${BROWSER_PROBE_ARTIFACT_DIR}"
          bash scripts/run-browser-probe-ci.sh \
            "${BROWSER_PROBE_ARTIFACT_DIR}/pages.log" \
            npm run browser:probe:pages

      - name: Run Browser Sentinel Probes
        run: |
          mkdir -p "${BROWSER_PROBE_ARTIFACT_DIR}"
          bash scripts/run-browser-probe-ci.sh \
            "${BROWSER_PROBE_ARTIFACT_DIR}/sentinel.log" \
            npm run browser:probe:sentinel

      - name: Upload Browser Smoke Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: browser-smoke-artifacts
          path: |
            playwright-report/**
            test-results/**
            artifacts/browser-probes/**
          if-no-files-found: warn

      - name: Write Browser Smoke Workflow Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Browser smoke"
            echo ""
            echo "- Playwright artifact: browser-smoke-artifacts"
            echo "- Probe logs: ${BROWSER_PROBE_ARTIFACT_DIR}"
            echo "- Dashboard probe log: ${BROWSER_PROBE_ARTIFACT_DIR}/dashboard.log"
            echo "- Pages probe log: ${BROWSER_PROBE_ARTIFACT_DIR}/pages.log"
            echo "- Sentinel probe log: ${BROWSER_PROBE_ARTIFACT_DIR}/sentinel.log"
          } >> "$GITHUB_STEP_SUMMARY"

  management_probes:
    name: Management Browser Probes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: krukraft_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d krukraft_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Browser CI
        uses: ./.github/actions/setup-browser-ci
        with:
          node-version: "24"
          playwright-browsers-path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}

      - name: Run Management Browser Probes
        run: |
          mkdir -p "${BROWSER_PROBE_ARTIFACT_DIR}"
          bash scripts/run-browser-probe-ci.sh \
            "${BROWSER_PROBE_ARTIFACT_DIR}/management.log" \
            npm run browser:probe:management

      - name: Upload Management Browser Probe Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: management-browser-probe-artifacts
          path: |
            test-results/**
            artifacts/browser-probes/management.log
          if-no-files-found: warn

      - name: Write Management Browser Probe Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Management browser probes"
            echo ""
            echo "- Artifact: management-browser-probe-artifacts"
            echo "- Probe log: ${BROWSER_PROBE_ARTIFACT_DIR}/management.log"
          } >> "$GITHUB_STEP_SUMMARY"
